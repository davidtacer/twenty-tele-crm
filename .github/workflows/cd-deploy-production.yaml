name: CD Build & Deploy Production

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write  # needed to push to GHCR

jobs:
  build-and-deploy:
    name: Build image & deploy to server
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/twenty-docker/twenty/Dockerfile
          push: true
          tags: ghcr.io/davidtacer/twenty-tele-crm:latest
          cache-from: type=registry,ref=ghcr.io/davidtacer/twenty-tele-crm:buildcache
          cache-to: type=registry,ref=ghcr.io/davidtacer/twenty-tele-crm:buildcache,mode=max
          build-args: |
            REACT_APP_SERVER_BASE_URL=https://leadko.si

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /var/www/twenty/packages/twenty-docker

            # Pull latest image from GHCR
            docker pull ghcr.io/davidtacer/twenty-tele-crm:latest

            # Ensure TWENTY_IMAGE is set in .env so docker-compose uses our custom image
            if grep -q '^TWENTY_IMAGE=' .env; then
              sed -i 's|^TWENTY_IMAGE=.*|TWENTY_IMAGE=ghcr.io/davidtacer/twenty-tele-crm:latest|' .env
            else
              echo 'TWENTY_IMAGE=ghcr.io/davidtacer/twenty-tele-crm:latest' >> .env
            fi

            docker compose up -d --force-recreate server worker

            # Wait for server to be healthy
            for i in $(seq 1 24); do
              STATUS=$(docker inspect twenty-server-1 --format '{{.State.Health.Status}}' 2>/dev/null)
              echo "[$i/24] server: $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                echo "Deployment successful!"
                exit 0
              fi
              sleep 10
            done

            echo "ERROR: server did not become healthy in time"
            docker compose logs server --tail=50
            exit 1

